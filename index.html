<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main>
      <div class="main-container-card">
        <div class="image-container">
          <img
            src="images/image-equilibrium.jpg"
            alt="equili"
            height="250"
            width="260"
          />
        </div>

        <div class="descri-container">
          <h2 class="descri-title">Equilibrium #3429</h2>
          <p>Our Equilibrium collection promotes balance and calm.</p>
          <h5>
            <img src="images/icon-ethereum.svg" alt="etehreum" />0.041 ETH
            <span class="time-left">
              <img src="images/icon-clock.svg" alt="clock" class="clock" />
              3 days left</span
            >
          </h5>
        </div>
        <div class="author-container">Creation of Jules Wyverns</div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
